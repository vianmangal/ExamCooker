trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  nodeVersion: "24.x"
  artifactName: "webapp"
  buildDir: "$(Agent.TempDirectory)/appservice-build"
  packageDir: "$(Build.ArtifactStagingDirectory)/package"
  packageZip: "$(Build.ArtifactStagingDirectory)/webapp.zip"
  azureServiceConnection: "azure-rm-examcooker-prod"
  appServiceName: "examcooker-2024"
  nextPublicMicroserviceUrl: "https://upload.examcooker.acmvit.in"

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build
        pool:
          name: Default
        steps:
          - checkout: self
            clean: true

          - task: UseNode@1
            displayName: Use Node.js $(nodeVersion)
            inputs:
              version: $(nodeVersion)

          - script: |
              set -eux
              rm -rf "$(buildDir)"
              mkdir -p "$(buildDir)"
              rsync -a \
                --delete \
                --exclude .git \
                --exclude node_modules \
                --exclude .next \
                --exclude .turbo \
                --exclude .DS_Store \
                ./ "$(buildDir)/"
            displayName: Prepare build workspace

          - script: |
              set -eux
              cd "$(buildDir)"
              npm install --no-fund --no-audit
            displayName: Install dependencies
            env:
              NEXT_PUBLIC_MICROSERVICE_URL: $(nextPublicMicroserviceUrl)

          - script: |
              set -eu
              cd "$(buildDir)"
              if [ -z "${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:-}" ] || [ "${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:-}" = '$''(NEXT_SERVER_ACTIONS_ENCRYPTION_KEY)' ]; then
                echo "NEXT_SERVER_ACTIONS_ENCRYPTION_KEY must be set as an Azure Pipelines secret variable for production builds." >&2
                exit 1
              fi
              node - <<'NODE'
              const key = process.env.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY || "";
              const bytes = Buffer.from(key, "base64");
              const normalized = bytes.toString("base64").replace(/=+$/, "");
              if (![16, 24, 32].includes(bytes.length) || normalized !== key.replace(/=+$/, "")) {
                console.error("NEXT_SERVER_ACTIONS_ENCRYPTION_KEY must be base64 for a 16, 24, or 32 byte AES key.");
                process.exit(1);
              }
              NODE
              npm run build
            displayName: Build app
            condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
            env:
              NEXT_PUBLIC_MICROSERVICE_URL: $(nextPublicMicroserviceUrl)
              NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: $(NEXT_SERVER_ACTIONS_ENCRYPTION_KEY)

          - script: |
              set -eux
              cd "$(buildDir)"
              npm run build
            displayName: Build app (non-production)
            condition: ne(variables['Build.SourceBranch'], 'refs/heads/main')
            env:
              NEXT_PUBLIC_MICROSERVICE_URL: $(nextPublicMicroserviceUrl)

          - script: |
              set -eux
              rm -rf "$(packageDir)"
              mkdir -p "$(packageDir)"

              rsync -a "$(buildDir)/.next/standalone/" "$(packageDir)/"

              mkdir -p "$(packageDir)/.next"
              rsync -a "$(buildDir)/.next/static/" "$(packageDir)/.next/static/"

              if [ -d "$(buildDir)/prisma" ]; then
                rsync -a "$(buildDir)/prisma/" "$(packageDir)/prisma/"
              fi

              if [ -d "$(buildDir)/lib/generated" ]; then
                mkdir -p "$(packageDir)/lib/generated"
                rsync -a "$(buildDir)/lib/generated/" "$(packageDir)/lib/generated/"
              fi

              if [ -d "$(buildDir)/public" ]; then
                rsync -a "$(buildDir)/public/" "$(packageDir)/public/"
              fi

              cp "$(buildDir)/startup.sh" "$(packageDir)/startup.sh"
            displayName: Package deployment payload

          - task: ArchiveFiles@2
            displayName: Archive deployment payload
            inputs:
              rootFolderOrFile: "$(packageDir)"
              includeRootFolder: false
              archiveType: zip
              archiveFile: "$(packageZip)"
              replaceExistingArchive: true

          - publish: "$(packageZip)"
            artifact: "$(artifactName)"
            displayName: Publish artifact

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployWebApp
        displayName: Deploy to Azure App Service
        pool:
          name: Default
        environment: examcooker-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "$(artifactName)"

                - task: AzureWebApp@1
                  displayName: Deploy web app
                  inputs:
                    azureSubscription: "$(azureServiceConnection)"
                    appType: webAppLinux
                    appName: "$(appServiceName)"
                    package: "$(Pipeline.Workspace)/$(artifactName)/webapp.zip"
                    startUpCommand: "bash /home/site/wwwroot/startup.sh"

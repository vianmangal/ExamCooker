trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  nodeVersion: "24.x"
  pnpmVersion: "10.33.0"
  artifactName: "webapp"
  packageDir: "$(Build.ArtifactStagingDirectory)/package"
  packageZip: "$(Build.ArtifactStagingDirectory)/webapp.zip"
  azureServiceConnection: "azure-rm-examcooker-prod"
  appServiceName: "examcooker-2024"

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build
        pool:
          name: Default
        steps:
          - checkout: self
            clean: true

          - task: UseNode@1
            displayName: Use Node.js $(nodeVersion)
            inputs:
              version: $(nodeVersion)

          - script: |
              set -eux
              corepack enable
              corepack prepare "pnpm@$(pnpmVersion)" --activate
              pnpm install --frozen-lockfile
            displayName: Install dependencies

          - script: pnpm build
            displayName: Build app

          - script: |
              set -eux
              rm -rf "$(packageDir)"
              mkdir -p "$(packageDir)"

              rsync -a .next/standalone/ "$(packageDir)/"

              mkdir -p "$(packageDir)/.next"
              rsync -a .next/static/ "$(packageDir)/.next/static/"

              mkdir -p "$(packageDir)/prisma"
              if [ -d prisma/generated ]; then
                rsync -a prisma/generated/ "$(packageDir)/prisma/generated/"
              fi
              if [ -f prisma/schema.prisma ]; then
                cp prisma/schema.prisma "$(packageDir)/prisma/schema.prisma"
              fi

              cp startup.sh "$(packageDir)/startup.sh"
            displayName: Package deployment payload

          - task: ArchiveFiles@2
            displayName: Archive deployment payload
            inputs:
              rootFolderOrFile: "$(packageDir)"
              includeRootFolder: false
              archiveType: zip
              archiveFile: "$(packageZip)"
              replaceExistingArchive: true

          - publish: "$(packageZip)"
            artifact: "$(artifactName)"
            displayName: Publish artifact

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployWebApp
        displayName: Deploy to Azure App Service
        pool:
          name: Default
        environment: examcooker-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "$(artifactName)"

                - task: AzureWebApp@1
                  displayName: Deploy web app
                  inputs:
                    azureSubscription: "$(azureServiceConnection)"
                    appType: webAppLinux
                    appName: "$(appServiceName)"
                    package: "$(Pipeline.Workspace)/$(artifactName)/webapp.zip"
                    startUpCommand: "bash /home/site/wwwroot/startup.sh"

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  nodeVersion: "24.x"
  artifactName: "webapp"
  buildDir: "$(Agent.TempDirectory)/appservice-build"
  packageDir: "$(Build.ArtifactStagingDirectory)/package"
  packageZip: "$(Build.ArtifactStagingDirectory)/webapp.zip"
  azureServiceConnection: "azure-rm-examcooker-prod"
  appServiceName: "examcooker-2024"

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build
        pool:
          name: Default
        steps:
          - checkout: self
            clean: true

          - task: UseNode@1
            displayName: Use Node.js $(nodeVersion)
            inputs:
              version: $(nodeVersion)

          - script: |
              set -eux
              rm -rf "$(buildDir)"
              mkdir -p "$(buildDir)"
              rsync -a \
                --delete \
                --exclude .git \
                --exclude node_modules \
                --exclude .next \
                --exclude .turbo \
                --exclude .DS_Store \
                ./ "$(buildDir)/"
            displayName: Prepare build workspace

          - script: |
              set -eux
              cd "$(buildDir)"
              npm install --no-fund --no-audit
            displayName: Install dependencies

          - script: |
              set -eux
              cd "$(buildDir)"
              npm run build
            displayName: Build app

          - script: |
              set -eux
              rm -rf "$(packageDir)"
              mkdir -p "$(packageDir)"

              rsync -a "$(buildDir)/.next/standalone/" "$(packageDir)/"

              mkdir -p "$(packageDir)/.next"
              rsync -a "$(buildDir)/.next/static/" "$(packageDir)/.next/static/"

              if [ -d "$(buildDir)/prisma" ]; then
                rsync -a "$(buildDir)/prisma/" "$(packageDir)/prisma/"
              fi

              if [ -d "$(buildDir)/lib/generated" ]; then
                mkdir -p "$(packageDir)/lib/generated"
                rsync -a "$(buildDir)/lib/generated/" "$(packageDir)/lib/generated/"
              fi

              if [ -d "$(buildDir)/public" ]; then
                rsync -a "$(buildDir)/public/" "$(packageDir)/public/"
              fi

              cp "$(buildDir)/startup.sh" "$(packageDir)/startup.sh"
            displayName: Package deployment payload

          - task: ArchiveFiles@2
            displayName: Archive deployment payload
            inputs:
              rootFolderOrFile: "$(packageDir)"
              includeRootFolder: false
              archiveType: zip
              archiveFile: "$(packageZip)"
              replaceExistingArchive: true

          - publish: "$(packageZip)"
            artifact: "$(artifactName)"
            displayName: Publish artifact

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployWebApp
        displayName: Deploy to Azure App Service
        pool:
          name: Default
        environment: examcooker-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "$(artifactName)"

                - task: AzureWebApp@1
                  displayName: Deploy web app
                  inputs:
                    azureSubscription: "$(azureServiceConnection)"
                    appType: webAppLinux
                    appName: "$(appServiceName)"
                    package: "$(Pipeline.Workspace)/$(artifactName)/webapp.zip"
                    startUpCommand: "bash /home/site/wwwroot/startup.sh"

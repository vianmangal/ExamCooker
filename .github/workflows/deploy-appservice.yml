name: Deploy App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PNPM_VERSION: 10.33.0

concurrency:
  group: deploy-appservice-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://exam-cooker.acmvit.in
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:26257/examcooker?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('next.config.ts', 'tsconfig.json', 'tailwind.config.ts', 'postcss.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Package deployment payload
        run: |
          set -eux
          rm -rf deploy
          mkdir -p deploy

          rsync -a .next/standalone/ deploy/
          mkdir -p deploy/.next
          rsync -a .next/static/ deploy/.next/static/

          mkdir -p deploy/prisma
          if [ -d prisma/generated ]; then
            rsync -a prisma/generated/ deploy/prisma/generated/
          fi

          if [ -f prisma/schema.prisma ]; then
            cp prisma/schema.prisma deploy/prisma/schema.prisma
          fi

          cp startup.sh deploy/startup.sh

          if [ -d public ]; then
            rsync -a public/ deploy/public/
          fi

          cd deploy
          zip -qry ../webapp-package.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: examcooker-2024
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: webapp-package.zip
